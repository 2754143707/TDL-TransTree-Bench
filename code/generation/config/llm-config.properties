# LLM Configuration
# This file is shipped with placeholder API keys for public release.
# Replace every YOUR_* placeholder with your real credentials before running experiments.
# Do NOT commit real API keys to version control.

# Active LLM (must match one of the llm.<name> blocks below)
llm.active=gemini

# Toolchain Settings
toolchain.maxRetries=3
toolchain.enableSyntaxPreCheck=true

# DeepSeek
llm.deepseek.name=DeepSeekV3.2
llm.deepseek.apiBase=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.deepseek.apiKey=YOUR_DEEPSEEK_API_KEY_HERE
llm.deepseek.model=deepseek-v3.2
llm.deepseek.temperature=0.0
llm.deepseek.maxTokens=4096
llm.deepseek.type=dsl-generation
llm.deepseek.enabled=true

# Qwen (DashScope)
llm.qwen.name=Qwen
llm.qwen.apiBase=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.qwen.apiKey=YOUR_QWEN_API_KEY_HERE
llm.qwen.model=qwen-max
llm.qwen.temperature=0.0
llm.qwen.maxTokens=4096
llm.qwen.type=dsl-generation
llm.qwen.enabled=true

# Qwen Plus (used in paper experiments)
llm.qwen-plus.name=Qwen Plus
llm.qwen-plus.apiBase=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.qwen-plus.apiKey=YOUR_QWEN_API_KEY_HERE
llm.qwen-plus.model=qwen-plus
llm.qwen-plus.temperature=0.0
llm.qwen-plus.maxTokens=4096
llm.qwen-plus.type=dsl-generation
llm.qwen-plus.enabled=true

# Claude (OpenAI-compatible proxy or vendor endpoint)
llm.claude.name=Claude
llm.claude.apiBase=YOUR_CLAUDE_API_BASE_HERE
llm.claude.apiKey=YOUR_CLAUDE_API_KEY_HERE
llm.claude.model=claude-opus-4-6
llm.claude.temperature=0.0
llm.claude.maxTokens=8192
llm.claude.type=dsl-generation
llm.claude.enabled=true

# GPT (OpenAI-compatible endpoint)
llm.gpt-5.2.name=GPT
llm.gpt-5.2.apiBase=YOUR_GPT_API_BASE_HERE
llm.gpt-5.2.apiKey=YOUR_GPT_API_KEY_HERE
llm.gpt-5.2.model=gpt-5.2
llm.gpt-5.2.temperature=0.0
llm.gpt-5.2.maxTokens=8192
llm.gpt-5.2.type=dsl-generation
llm.gpt-5.2.enabled=true

# Doubao DSL generation
llm.doubao-dsl.name=Doubao-Seed-1.6-flash
llm.doubao-dsl.apiBase=https://ark.cn-beijing.volces.com/api/v3/chat/completions
llm.doubao-dsl.apiKey=YOUR_DOUBAO_API_KEY_HERE
llm.doubao-dsl.model=YOUR_DOUBAO_MODEL_ID_HERE
llm.doubao-dsl.temperature=0.0
llm.doubao-dsl.maxTokens=4096
llm.doubao-dsl.type=dsl-generation
llm.doubao-dsl.enabled=true

# Doubao image annotation
llm.doubao-image.name=Doubao-Seedream-4.5
llm.doubao-image.apiBase=https://ark.cn-beijing.volces.com/api/v3/images/generations
llm.doubao-image.apiKey=YOUR_DOUBAO_IMAGE_API_KEY_HERE
